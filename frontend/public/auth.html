<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptWall - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="auth-logo-text">PromptWall</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div id="form-login">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Sign in to continue training your models</div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="login-password" placeholder="Your password" required autocomplete="current-password">
          </div>
          <div class="error-msg" id="login-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:18px">
            <span id="login-btn-text">Sign In</span>
          </button>
        </form>
      </div>

      <div id="form-signup" style="display:none">
        <div class="auth-title">Get started</div>
        <div class="auth-subtitle">Two training models are provisioned automatically</div>
        <form id="signup-form" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="signup-name" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="signup-password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
          </div>
          <div class="error-msg" id="signup-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="signup-btn" style="margin-top:18px">
            <span id="signup-btn-text">Create Account</span>
          </button>
        </form>
      </div>
    </div>
  </div>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
